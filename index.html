<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авиаперевозки грузов</title>
    <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">
    <style>

        :root {
            --purple: #34084b;
            --gray-dark: #333;
            --gray: #666;
            --gray-light: #a9a9a9;
            --gray-bg: #f5f5f5;
            --gray-border: #d9d9d9;
            --gold: #f0d246;
            --white: #ffffff;
            --card-bg: #f9f9f9;
            --light-gray: #e8e8e8;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Roboto', 'Arial', sans-serif;
            background-color: var(--white);
            color: var(--gray-dark);
        }
        
        /* заголовок */
        .header {
            background-color: var(--white);
            border-bottom: 1px solid var(--gray-border);
            padding: 20px 0;
        }
        
        .logo {
            font-size: 28px;
            font-weight: 700;
            color: var(--purple);
        }
        .header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .home-button {
            background: transparent;
            border: 2px solid var(--gold);
            border-radius: 0;
            padding: 8px 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--gray-dark);
        }

        .home-button:hover {
            background: var(--gold);
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .header .container {
                flex-direction: column;
                gap: 15px;
            }
        }
        
        /* калькулятор фон */
        .calculator-wrapper {
            width: 100%;
    background-image: url('plane-header.jpg'); 
    background-size: cover;
    background-position: center;
    border-bottom: 1px solid var(--gray-border);
    border-top: 1px solid var(--gray-border);

        }
        
        .calculator-card {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        .calculator-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 20px;
        }
        
        .form-control-custom {
            border: 1px solid var(--gray-border);
            border-radius: 0;
            padding: 12px 15px;
            width: 100%;
            font-size: 14px;
            transition: all 0.3s;
            background: var(--white);
        }
        
        .form-control-custom:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 2px rgba(240, 210, 70, 0.2);
        }
        
        .result-box {
            background-color: var(--white);
            border-radius: 0;
            padding: 15px;
            margin-top: 20px;
            border: 1px solid var(--gray-border);
            text-align: center;
        }
        
        .result-price {
            font-size: 28px;
            font-weight: 700;
            color: var(--gold);
        }
        /* Стили для стран и самолетов на детальной странице */
        .country-item {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: var(--gray-bg);
            padding: 5px 12px;
            font-size: 13px;
            color: var(--gray-dark);
        }

        .country-item svg {
            width: 14px;
            height: 14px;
            stroke: var(--purple);
        }

        .aircraft-card {
            background: var(--white);
            border: 1px solid var(--gray-border);
            padding: 12px 15px;
            flex: 1;
            min-width: 150px;
        }

        .aircraft-name {
            font-weight: 700;
            color: var(--purple);
            margin-bottom: 5px;
            font-size: 14px;
        }

        .aircraft-capacity, .aircraft-range {
            font-size: 11px;
            color: var(--gray);
            margin-top: 3px;
        }
        /* кнопки */
        .btn-calculate {
            background: var(--white);
            border: 2px solid var(--gold);
            border-radius: 0;
            padding: 12px 30px;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s;
            color: var(--gray-dark);
            cursor: pointer;
        }
        .card-btn-delete {
            background: transparent;
            border: 2px solid var(--gold);
            border-radius: 0;
            padding: 12px 20px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--gray-dark);
        }

        .card-btn-delete:hover {
            background: var(--gold);
            transform: translateY(-2px);
        }
        
        .btn-calculate:hover {
            background: var(--gold);
            color: var(--gray-dark);
            transform: translateY(-2px);
        }
        
        .search-btn, .action-btn-add, .btn-order, .card-btn, .back-button {
            background: transparent;
            border: 2px solid var(--gold);
            border-radius: 0;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--gray-dark);
        }
        
        .search-btn { padding: 12px 24px; }
        .action-btn-add { padding: 12px 24px; }
        
        .btn-order {
            background: var(--white);
            border: 2px solid var(--gold);
            border-radius: 0;
            padding: 14px;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s;
            color: var(--gray-dark);
            cursor: pointer;
            font-size: 16px;
        }
        
        .btn-order:hover {
            background: var(--gold);
            color: var(--gray-dark);
            transform: translateY(-2px);
        }
        
        .card-btn { 
            padding: 12px 20px; 
            width: 100%; 
            font-size: 14px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            background: transparent;
        }
        
        .back-button { 
            padding: 10px 20px; 
            display: inline-block;
            background: transparent;
        }
        
        .search-btn:hover, .action-btn-add:hover, .card-btn:hover, .back-button:hover {
            background: var(--gold);
            color: var(--gray-dark);
            transform: translateY(-2px);
        }
        
        .action-btn-add span { font-size: 18px; margin-right: 6px; }
        .card-btn:hover .btn-arrow { transform: translateX(5px); }
        .btn-arrow { transition: transform 0.3s ease; }
        
        /* панель управления */
        .control-panel {
            background: var(--white);
            border-radius: 0;
            padding: 20px;
            margin: 30px 0;
            border: 1px solid var(--gray-border);
        }
        
        .control-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .search-box {
            flex: 1;
            display: flex;
            gap: 12px;
        }
        
        .search-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--gray-border);
            border-radius: 0;
            font-size: 14px;
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--gold);
        }
        
        .action-buttons {
            display: flex;
            gap: 12px;
        }
        
        /* карточки */
        .modern-card {
            background: var(--white);
            border-radius: 0;
            padding: 28px 24px;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            border: 1px solid var(--gray-border);
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        .modern-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--gold), #ffde6e);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }
        
        .modern-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
            border-color: var(--gold);
        }
        
        .modern-card:hover::before {
            transform: scaleX(1);
        }
        
        .card-header-actions {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }
        
        .card-icon svg {
            width: 32px;
            height: 32px;
            stroke: #000000;
            stroke-width: 1.5;
            fill: none;
        }
        
        .delete-card-btn {
            background: transparent;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
            opacity: 0.6;
            color: var(--gray);
        }
        
        .delete-card-btn:hover {
            opacity: 1;
            background: rgba(0, 0, 0, 0.05);
        }
        
        .card-category {
            display: inline-block;
            background: var(--gray-bg);
            color: var(--gray);
            font-size: 12px;
            font-weight: 600;
            padding: 4px 12px;
            margin-bottom: 16px;
        }
        
        .card-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--gray-dark);
            margin-bottom: 12px;
        }
        
        .card-description {
            font-size: 14px;
            color: var(--gray);
            line-height: 1.5;
            margin-bottom: 20px;
            flex-grow: 1;
        }
        
        .card-features {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
            padding: 12px 0;
            border-top: 1px solid var(--gray-border);
            border-bottom: 1px solid var(--gray-border);
        }
        
        .feature {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--gray);
        }
        
        .feature-icon svg {
            width: 14px;
            height: 14px;
            stroke: var(--gray);
            stroke-width: 1.5;
            fill: none;
        }
        
        .card-price {
            font-size: 28px;
            font-weight: 800;
            color: var(--gold);
            margin-bottom: 20px;
        }
        
        .card-price small {
            font-size: 14px;
            font-weight: 400;
            color: var(--gray-light);
        }
        
        /* Секция услуг */
        .services-section {
            margin: 40px 0;
        }
        
        .section-header {
            margin-bottom: 40px;
        }
        
        .section-title-wrapper {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .section-icon svg {
            width: 48px;
            height: 48px;
            stroke: var(--purple);
            stroke-width: 1.5;
            fill: none;
        }
        
        .section-title {
            font-size: 32px;
            font-weight: 700;
            color: var(--gray-dark);
            margin-bottom: 8px;
        }
        
        .section-subtitle {
            font-size: 16px;
            color: var(--gray);
        }
        
        /* Сетка карточек */
        .services-grid {
            display: flex;
            flex-wrap: wrap;
            margin: 0 -12px;
        }
        
        .services-grid .col-md-4 {
            padding: 0 12px;
        }
        
        /* Детальная страница */
        .detail-page-container {
            background-color: var(--white);
            margin: 0;
            padding: 40px 0;
            width: 100%;
        }
        
        .detail-card {
            background: var(--light-gray);
            border-radius: 0;
            padding: 40px;
            border: 1px solid var(--gray-border);
            width: 100%;
        }
        
        .detail-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        .detail-image {
            width: 100%;
            border-radius: 0;
            margin-bottom: 20px;
        }
        
        .detail-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--gray-dark);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .detail-title-icon svg {
            width: 32px;
            height: 32px;
            stroke: var(--gray-dark);
            stroke-width: 1.5;
            fill: none;
        }
        
        .detail-price {
            font-size: 32px;
            font-weight: 700;
            color: var(--gold);
            margin: 20px 0;
        }
        
        .detail-info {
            background: var(--white);
            border-radius: 0;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid var(--gray-border);
        }
        
        .detail-info-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--gray-border);
        }
        
        .detail-info-item:last-child {
            border-bottom: none;
        }
        
        .detail-info-label {
            font-weight: 600;
            color: var(--gray-dark);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .detail-info-label svg {
            width: 18px;
            height: 18px;
            stroke: var(--gray-dark);
            stroke-width: 1.5;
            fill: none;
        }
        
        .detail-info-value {
            color: var(--gray);
        }
        
        /* Кнопка назад */
        .back-button-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 20px 20px;
        }
        
        /* Toast */
        .toast-custom {
            background: var(--white);
            border-left: 4px solid var(--gold);
            border-radius: 0;
        }
        
        .toast-custom .toast-header {
            background: var(--purple);
            color: var(--white);
            border-bottom: none;
        }
        
        /* Футер */
        .footer {
            background-color: var(--gray-bg);
            border-top: 1px solid var(--gray-border);
            padding: 30px 0;
            margin-top: 60px;
            text-align: center;
            color: var(--gray);
            font-size: 14px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        @media (max-width: 992px) {
            .services-grid .col-md-4 {
                flex: 0 0 50%;
                max-width: 50%;
            }
        }
        
        @media (max-width: 768px) {
            .control-group {
                flex-direction: column;
            }
            .search-box { width: 100%; }
            .action-buttons { width: 100%; }
            .action-btn-add { width: 100%; text-align: center; }
            .services-grid .col-md-4 {
                flex: 0 0 100%;
                max-width: 100%;
            }
            .back-button-wrapper { padding: 0 20px 20px 20px; }
            .detail-card { padding: 20px; }
            .section-title { font-size: 24px; }
        }
        /* Убираем иконки автозаполнения в WebKit браузерах (Chrome, Safari) */
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px white inset !important;
            box-shadow: 0 0 0 30px white inset !important;
        }

/* Убираем иконку человечка в Chrome */
        input::-webkit-contacts-auto-fill-button,
        input::-webkit-credentials-auto-fill-button {
            visibility: hidden;
            display: none !important;
            pointer-events: none;
            position: absolute;
            right: 0;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">Авиаперевозки грузов</div>
            <button id="home-button" class="home-button">Домой</button>
        </div>
    </header>
    
    <div id="root"></div>
    
    <footer class="footer">
        <div class="container">
            <p>© 2025 Авиаперевозки грузов - доставка по России и миру</p>
            <p style="font-size: 12px;">Быстро, надежно, профессионально</p>
        </div>
    </footer>
    
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1100;"></div>
    
    <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js" type="module"></script>
</body>
</html>
