<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Калькулятор</title>
    <link rel="stylesheet" href="calculator.css">
</head>

<body>
    
    <div class="plane-bg"></div>
    
    
    <details class="author-box">
        <summary>Об авторе</summary>
        <p>Горячева Софья Александровна</p>
    </details>

    <div class="calculator">
        <div class="calculator-body">
            
            <div id="result" class="result">
                0
            </div>

            <div class="buttons-grid">
                <!-- Ряд 1: серые кнопки операций -->
                <div class="button-row">
                    <button class="my-btn operation">C</button>
                    <button class="my-btn operation">+/-</button>
                    <button class="my-btn operation">%</button>
                    <button class="my-btn operation">/</button>
                </div>

                <!-- Ряд 2: желтые цифры + серая операция -->
                <div class="button-row">
                    <button class="my-btn digit">7</button>
                    <button class="my-btn digit">8</button>
                    <button class="my-btn digit">9</button>
                    <button class="my-btn operation">x</button>
                </div>

                <!-- Ряд 3: желтые цифры + серая операция -->
                <div class="button-row">
                    <button class="my-btn digit">4</button>
                    <button class="my-btn digit">5</button>
                    <button class="my-btn digit">6</button>
                    <button class="my-btn operation">-</button>
                </div>

                <!-- Ряд 4: желтые цифры + серая операция -->
                <div class="button-row">
                    <button class="my-btn digit">1</button>
                    <button class="my-btn digit">2</button>
                    <button class="my-btn digit">3</button>
                    <button class="my-btn operation">+</button>
                </div>

                <!-- Ряд 5: желтые цифры + желтая "=" -->
                <div class="button-row">
                    <button class="my-btn digit">0</button>
                    <button class="my-btn digit">.</button>
                    <button class="my-btn digit execute">=</button>
                </div>

                <!-- Ряд 6: желтая кнопка GitHub -->
                <div class="button-row">
                    <a href="https://github.com/sonechka-goryacheva/Goryacheva-PNA-Labs-2026" target="_blank" class="my-btn github">GitHub</a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
